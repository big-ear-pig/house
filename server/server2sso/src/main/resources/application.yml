spring:
  application:
    name: server2sso
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.128.128:8848
        namespace: f99af842-0a0c-4101-83f9-2871a59a0890
        group: DEFAULT_GROUP
        cluster-name: DEFAULT
    sentinel:
      transport:
        dashboard: 192.168.128.128:8999
        port: 8719
      datasource:
        ds1:  # 数据源名称，可自定义
          nacos:
            server-addr: 192.168.128.128:8848
            namespace: f99af842-0a0c-4101-83f9-2871a59a0890
            data-id: ${spring.application.name}-flow-rules
            group-id: DEFAULT_GROUP
            data-type: json
            rule-type: flow
  profiles:
    active: local # 指定激活的配置文件，如 dev(开发)、test(测试)、prod(生产)
  main:
    allow-bean-definition-overriding: false # 是否允许覆盖同名的Bean
    banner-mode: "console" # Banner显示模式，可选：console, log, off
  servlet:
    multipart:
      enabled: true # 是否启用文件上传功能
      max-file-size: 10MB # 单个文件的最大大小
      max-request-size: 100MB # 整个HTTP请求的最大大小
      file-size-threshold: 0 # 文件大小超过该阈值后，将被写入磁盘
      location: /tmp/uploads # 上传文件的临时存储目录
  mail:
    host: smtp.qq.com
    port: 587
    username: 1637706385@qq.com
    password: chlzafncmyccegjf
    default-encoding: UTF-8
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          socketFactoryClass: javax.net.ssl.SSLSocketFactory
          debug: true
  datasource:
    url: jdbc:mysql://192.168.128.128:3306/wuhu?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: 123456 # 生产环境建议使用环境变量
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari: # HikariCP 连接池专用配置
      maximum-pool-size: 10 # 连接池最大连接数
      minimum-idle: 5 # 最小空闲连接数
      idle-timeout: 30000 # 空闲连接超时时间(毫秒)
      connection-timeout: 20000 # 客户端获取连接的超时时间(毫秒)
  redis:
    host: 192.168.128.128 # Redis 服务器地址
    port: 6379 # 端口
    password: # 密码，若无则留空
    database: 0 # 使用的数据库索引
    timeout: 3000ms # 连接超时时间
    lettuce:
      pool: # Lettuce 连接池配置
        max-active: 8 # 连接池最大连接数
        max-idle: 8 # 连接池最大空闲连接数
        min-idle: 0 # 连接池最小空闲连接数
  rabbitmq:
    host: 192.168.128.128
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        #消费者最小数量
        concurrency: 10
        max-concurrency: 10
        prefetch: 1
        auto-startup: true
        default-requeue-rejected: true
      template:
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          max-interval: 10000ms
          multiplier: 1
  zipkin:
    base-url: http://192.168.128.128:9411  # [reference:5]替换为你的Zipkin服务器地址
    sender:
      type: web  # [reference:6]使用HTTP协议发送，另有rabbit、kafka等
    discovery-client-enabled: false  # [reference:7]避免将zipkin的url误认为服务名
  sleuth:
    sampler:
      probability: 1.0  # [reference:8]采样率，1.0=100%采样，生产环境建议调低(如0.1)
server:
  port: 8081 # 服务启动端口
  servlet:
    context-path:  # 应用上下文路径，例如：http://localhost:8080/api
  shutdown: graceful # 开启优雅停机，停止时等待现有请求处理完成
  tomcat:
    threads:
      max: 200 # 最大工作线程数
      min-spare: 10 # 最小空闲工作线程数
    accept-count: 100 # 等待队列的最大长度
    connection-timeout: 5000 # 连接超时时间(毫秒)
  compression:
    enabled: true # 启用GZIP压缩
    min-response-size: 1024 # 触发压缩的最小响应大小(字节)
    mime-types: text/html,text/xml,application/json # 需要进行压缩的MIME类型
logging:
  level: # 日志级别设置 (TRACE, DEBUG, INFO, WARN, ERROR)
    root: info # 全局日志级别
    org.bigearpig: debug # 为具体包设置日志级别
  file:
    name: ./logs/${spring.application.name}/out.log # 日志文件输出路径
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n" # 控制台日志输出格式
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n" # 文件日志格式
